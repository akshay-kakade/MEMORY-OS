services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memoryos-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - PORT=8001
    volumes:
      - ./backend/data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8001
    container_name: memoryos-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
